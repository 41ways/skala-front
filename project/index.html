<!DOCTYPE html>
<html lang="ko">
<head>

<body class="page-index">
    <div class="scroll-progress" aria-hidden="true"></div>
    <a class="skip-link" href="#info">본문 바로가기</a>

    <!-- @섹션 인트로: Hello,world!(기본 폰트) → 한 글자씩 모프 → I'm 한결 → 도넛 원형 메뉴 -->
    <!-- @주의 과제 요구사항(<nav><main><aside>)을 맞추기 위해 인트로는 <main>, 아래 정보 섹션은 <aside>로 감쌈 -->
    <main aria-label="메인 콘텐츠">
    <section class="intro" id="intro" aria-label="인트로">
        <div class="intro__stage">
            <div class="intro__text">
                <p class="intro__hello" id="introHello">
                    <span class="intro__hello-old" id="helloOld" aria-hidden="true"></span>
                    <span class="intro__hello-new" id="helloNew" aria-hidden="true"></span>
                    <span class="sr-only" style="position:absolute;left:-9999px;">Hello, world!</span>
                </p>
                <p class="intro__name" id="introName">I'm 한결</p>
                <p class="intro__scroll" id="introScroll" aria-hidden="true">Scroll ↓</p>
            </div>

        </div>

        <!-- @동작 세로 4분할 구분선 메뉴: 타이틀 전환 후 왼쪽부터 순차 등장, hover 시 그 칸이 넓어지며 밝아짐 -->
        <nav class="split-menu" id="splitMenu" aria-label="주요 메뉴">
            <a class="split-panel" data-cat="profile" href="myProfile.html">
                <img class="split-panel__bg" src="media/index/idx-profile.svg" alt="" aria-hidden="true">

            </a>
            <a class="split-panel" data-cat="class" href="myClass.html">
                <img class="split-panel__bg" src="media/index/idx-class.svg" alt="" aria-hidden="true">
                <span class="split-panel__label">시간표</span>
                <span class="split-panel__en">SCHEDULE</span>
            </a>
            <a class="split-panel" data-cat="album" href="myTrip.html">
                <img class="split-panel__bg" src="media/index/idx-album.svg" alt="" aria-hidden="true">
                <span class="split-panel__label">앨범</span>
                <span class="split-panel__en">ALBUM</span>
            </a>
            <a class="split-panel" data-cat="holiday" href="myHoliday.html">
                <img class="split-panel__bg" src="media/index/idx-holiday.svg" alt="" aria-hidden="true">

    <!-- @섹션 우상단 고정 인증 버튼: 로그인 / 회원가입 -->
    <div class="signup-fab" id="signupFab">
        <a href="login.html">로그인</a>
        <a href="signUp.html">회원가입</a>
    </div>

    <!-- @섹션 추가 정보: 도넛 메뉴 등장 후 카드가 하나씩 나타남 (본문의 핵심은 아니라서 aside로 표시) -->
    <!-- @확장 내용은 이후 script/weatherAPI.js, upDown.js, grade.js, bag.js 연결 예정. 지금은 자리만 마련 -->
    <aside id="info" aria-label="추가 정보">
        <section class="info">
            <div class="info__head" id="infoHead">
                <p class="info__eyebrow">LIVE</p>
                <h2 class="info__title">실시간 정보 &amp; 미니 게임</h2>
            </div>
            <div class="info__grid">
                <article class="info-card" id="weatherCard">
                    <h3 class="info-card__title">🌤 실시간 세계 날씨</h3>
                    <select class="info-card__select" id="citySelect">
                        <option value="" selected disabled>도시를 선택하세요</option>
                        <option value="37.56,126.97">대한민국 서울 🇰🇷</option>
                        <option value="35.67,139.65">일본 도쿄 🇯🇵</option>
                        <option value="48.85,2.35">프랑스 파리 🇫🇷</option>
                    </select>
                    <div class="info-card__body" id="weatherBox">
                        <p class="info-card__placeholder">도시를 선택하면 날씨가 표시됩니다.</p>
                    </div>
                </article>

                <article class="info-card" id="upDownCard">
                    <h3 class="info-card__title">🎯 업다운 숫자 맞추기</h3>
                    <p class="info-card__desc">1~50 사이 숫자를 컴퓨터가 정하면 맞혀보세요.</p>
                    <button type="button" class="info-card__btn" id="startUpDown">게임 시작</button>
                </article>

                <article class="info-card" id="gradeCard">
                    <h3 class="info-card__title">📊 성적 계산기</h3>
                    <p class="info-card__desc">3과목 점수를 입력해 평균과 합격 여부를 확인합니다.</p>
                    <button type="button" class="info-card__btn" id="startGrade">계산 시작</button>
                </article>

                <article class="info-card" id="bagCard">
                    <h3 class="info-card__title">🎒 내 가방 보기</h3>
                    <p class="info-card__desc">가방 속 물품 목록을 확인합니다.</p>
                    <button type="button" class="info-card__btn" id="showBag">가방 열기</button>
                </article>
            </div>
        </section>
    </aside>

    <footer class="footer">
        <address class="footer__meta">작성: 한결 · <time datetime="2026-07">2026년 7월</time></address>
    </footer>

    <a class="totop" href="#intro" id="totop" aria-label="맨 위로">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 15 L12 8 L19 15"></path></svg>
    </a>

    <script>
// ==========================================================================
// index.html - 인트로 타임라인 (Hello,world! → 모프 → 이름 → 도넛메뉴 → 정보카드)
// ==========================================================================

// --- @동작 1. Hello, world! 글자를 한 글자씩 span으로 분리 (old=기본체 / new=필기체) ---
const introText = "Hello, world!";
const oldWrap = document.getElementById('helloOld');
const newWrap = document.getElementById('helloNew');

function buildLetters(wrap) {
    introText.split('').forEach((ch, i) => {
        const span = document.createElement('span');
        span.textContent = ch === ' ' ? ' ' : ch;   // @주의 공백은 nbsp로 치환해 폭이 사라지지 않게 함
        span.style.setProperty('--i', i);
        wrap.appendChild(span);
    });
}
buildLetters(oldWrap);
buildLetters(newWrap);

// --- @동작 1-b. 첫 'Hello, world!'를 타자 치듯 한 글자씩 + 깜빡이는 텍스트 커서 ---
const oldLetters = [...oldWrap.querySelectorAll('span')];   // @주의 커서 append 전에 '글자'만 수집
const caret = document.createElement('span');
caret.className = 'intro__caret';
caret.setAttribute('aria-hidden', 'true');
oldWrap.appendChild(caret);
oldLetters.forEach((s) => { s.style.display = 'none'; });   // 처음엔 숨겼다가 타이핑으로 하나씩 표시

const TYPE_START = 350;                     // 타이핑 시작 전 짧은 대기
const TYPE_SPEED = 95;                      // 글자당 간격(ms)
const TYPE_PAUSE = 700;                     // 다 친 뒤 커서 깜빡이며 대기
oldLetters.forEach((s, i) => setTimeout(() => { s.style.display = ''; }, TYPE_START + i * TYPE_SPEED));
const TYPE_END = TYPE_START + oldLetters.length * TYPE_SPEED;

// --- @동작 2. 시퀀스 타이밍 정의 (숫자만 조정하면 속도 변경 가능) ---
const introSection = document.getElementById('intro');
const introName = document.getElementById('introName');
const introScroll = document.getElementById('introScroll');
const splitMenu = document.getElementById('splitMenu');
const splitPanels = [...document.querySelectorAll('.split-panel')];
const signupFab = document.getElementById('signupFab');
const infoHead = document.getElementById('infoHead');
const infoGrid = document.querySelector('.info__grid');
const infoCards = [...document.querySelectorAll('.info-card')];

const T_MORPH_START = TYPE_END + TYPE_PAUSE;   // @동작 타자가 끝나고 커서 깜빡이며 잠깐 대기한 뒤 지지직 시작
const GLITCH1_DURATION = 180;             // 빠른 지직(1)
const GLITCH_REST = 150;                  // 잠깐 쉼
const GLITCH2_DURATION = 380;             // 더 긴 지지직(2)
const GLITCH_PHASE_TOTAL = GLITCH1_DURATION + GLITCH_REST + GLITCH2_DURATION;  // 지지직 단계 전체(배경은 이 동안 흰색 유지)
const TV_OFF_DURATION = 320;              // TV 꺼지듯 수축하며 소멸
const T_TRANSITION_START = T_MORPH_START + GLITCH_PHASE_TOTAL;   // @동작 지지직이 '끝난' 시점 = 타이틀 전환 시작(배경도 이때부터 어두워짐)
const MORPH_DURATION = 1300;              // 새 텍스트가 한 글자씩 등장하는 전체 시간
const T_NAME = T_TRANSITION_START + TV_OFF_DURATION + MORPH_DURATION;   // 모프 끝난 뒤 이름 등장
const T_MENU = T_NAME + 650;                       // 이름 등장 후 4분할 패널 등장
const PANEL_STAGGER = 150;                         // 패널이 옆에서부터 하나씩 쌓이는 간격
const INFO_STAGGER = 160;

// @동작 타자가 끝나 지지직이 시작되는 순간 커서 제거
setTimeout(() => { caret.style.display = 'none'; }, T_MORPH_START);

// @동작 1단계(지지직, 배경은 흰색 유지): 빠른 지직 → 쉼 → 긴 지지직
setTimeout(() => oldWrap.classList.add('is-glitch-1'), T_MORPH_START);
setTimeout(() => oldWrap.classList.remove('is-glitch-1'), T_MORPH_START + GLITCH1_DURATION);
setTimeout(() => oldWrap.classList.add('is-glitch-2'), T_MORPH_START + GLITCH1_DURATION + GLITCH_REST);
setTimeout(() => oldWrap.classList.remove('is-glitch-2'), T_TRANSITION_START);

// @동작 2단계(타이틀 전환, 지지직이 끝난 시점부터 시작): 배경이 어두워지기 시작 + TV 꺼지듯 소멸
setTimeout(() => {
    document.body.classList.add('is-morphing');
    introSection.classList.add('is-morphing');
    oldWrap.classList.add('is-tv-off');
}, T_TRANSITION_START);

// @동작 3단계: TV 꺼짐이 끝나면 새 텍스트가 한 글자씩 등장
setTimeout(() => introSection.classList.add('is-swapped'), T_TRANSITION_START + TV_OFF_DURATION);

setTimeout(() => introName.classList.add('is-visible'), T_NAME);

setTimeout(() => {
    signupFab.classList.add('is-visible');
    introScroll.classList.add('is-visible');
    introSection.classList.add('is-menu');   // @동작 메뉴 등장과 함께 타이틀을 조금 위로
    // @동작 패널이 소개→시간표→앨범→계획 순으로 옆(왼쪽)에서부터 하나씩 쌓이듯 등장
    splitPanels.forEach((el, i) => {
        setTimeout(() => el.classList.add('is-visible'), i * PANEL_STAGGER);
    });
    // @동작 모든 칸이 다 뜬 뒤에야 hover/클릭 활성화 (그 전엔 hover 안 됨)
    setTimeout(() => splitMenu.classList.add('is-ready'), (splitPanels.length - 1) * PANEL_STAGGER + 700);
}, T_MENU);

// --- @동작 3. 추가 정보 섹션: 타이틀 전환(T_NAME)이 끝난 뒤부터만 스크롤 관찰을 시작.
//     그 전에는 스크롤을 내려도 보이지 않고, 전환 후 이 구간에 들어와야 순차 등장 ---
let infoReady = false;
let infoRevealed = false;
function revealInfo() {
    if (infoRevealed) return;
    infoRevealed = true;
    infoHead.classList.add('is-visible');
    infoCards.forEach((card, i) => {
        setTimeout(() => card.classList.add('is-visible'), i * INFO_STAGGER);
    });
}
const infoObserver = new IntersectionObserver((entries) => {
    entries.forEach((e) => {
        if (e.isIntersecting && infoReady) { revealInfo(); infoObserver.disconnect(); }
    });
}, { threshold: 0.15 });
infoObserver.observe(infoGrid);

setTimeout(() => {
    infoReady = true;
    // @주의 전환이 끝나기 전에 이미 스크롤해서 화면 안에 들어와 있었다면 바로 반영
    const rect = infoGrid.getBoundingClientRect();
    if (rect.top < window.innerHeight && rect.bottom > 0) revealInfo();
}, T_NAME);

// --- @동작 4. 스크롤 등장 (.reveal 요소들: 한 번 보이면 관찰 해제) ---
const io = new IntersectionObserver((entries) => {
    entries.forEach((e) => {
        if (e.isIntersecting) { e.target.classList.add('is-visible'); io.unobserve(e.target); }
    });
}, { threshold: 0.2 });
document.querySelectorAll('.reveal').forEach((el) => io.observe(el));

// --- @동작 5. 스크롤 시 맨 위로 버튼 표시 ---
const onScroll = () => document.body.classList.toggle('scrolled', window.scrollY > 40);
window.addEventListener('scroll', onScroll, { passive: true });
onScroll();

// --- @확장 미니 게임/날씨 버튼: 지금은 자리만 마련, 추후 script/*.js 연결 예정 ---
// document.getElementById('startUpDown').addEventListener('click', startUpDown);
// document.getElementById('startGrade').addEventListener('click', checkGrade);
// document.getElementById('showBag').addEventListener('click', showMyBag);
// document.getElementById('citySelect').addEventListener('change', onCityChange);
    
// ===== ATELIER 포팅킷: 커스텀 커서 + 오버레이 메뉴 + 스크롤 프로그레스 (IIFE, 기존 코드와 충돌 없음) =====
(function () {
    'use strict';
    var reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    var finePointer  = window.matchMedia('(hover: hover) and (pointer: fine)').matches;

    function initCursor() {
        if (!finePointer || reduceMotion) return;
        var dot = document.createElement('div'), ring = document.createElement('div');
        dot.className = 'cursor-dot'; ring.className = 'cursor-ring';
        document.body.append(dot, ring);
        var mx = innerWidth / 2, my = innerHeight / 2, rx = mx, ry = my;
        document.addEventListener('mousemove', function (e) {
            mx = e.clientX; my = e.clientY;
            dot.style.transform = 'translate(' + mx + 'px,' + my + 'px)';
        });
        (function loop() {
            rx += (mx - rx) * 0.16; ry += (my - ry) * 0.16;
            ring.style.transform = 'translate(' + rx + 'px,' + ry + 'px)';
            requestAnimationFrame(loop);
        })();
        var hoverSel = 'a, button, select, input, textarea, label, .split-panel, .tg-tile, .pass__ticket, .flip, .goal-card, .cl-nav__toggle';
        document.addEventListener('mouseover', function (e) { if (e.target.closest(hoverSel)) ring.classList.add('is-hover'); });
        document.addEventListener('mouseout', function (e) { if (e.target.closest(hoverSel)) ring.classList.remove('is-hover'); });
    }

    function initOverlayMenu() {
        var menu = document.getElementById('overlayMenu');
        var openBtn = document.getElementById('menuBtn');
        var closeBtn = document.getElementById('overlayClose');
        if (!menu || !openBtn) return;
        var open = function () { menu.classList.add('is-open'); document.body.classList.add('menu-open'); openBtn.setAttribute('aria-expanded', 'true'); };
        var close = function () { menu.classList.remove('is-open'); document.body.classList.remove('menu-open'); openBtn.setAttribute('aria-expanded', 'false'); };
        openBtn.addEventListener('click', open);
        if (closeBtn) closeBtn.addEventListener('click', close);
        menu.querySelectorAll('.overlay-nav a').forEach(function (a) { a.addEventListener('click', close); });
        document.addEventListener('keydown', function (e) { if (e.key === 'Escape') close(); });
    }

    function initProgress() {
        var bar = document.querySelector('.scroll-progress');
        if (!bar) return;
        var onScroll = function () {
            var h = document.documentElement;
            var max = h.scrollHeight - h.clientHeight;
            bar.style.width = (max > 0 ? (h.scrollTop / max) * 100 : 0) + '%';
        };
        document.addEventListener('scroll', onScroll, { passive: true });
        onScroll();
    }

    var boot = function () { initCursor(); initOverlayMenu(); initProgress(); };
    if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', boot); else boot();
})();

    </script>
    <script defer src="js/music-continue.js"></script>
