    <!-- @동작 필름 릴(배경 회전) + 필름 스트립(자동 흐름) + 프레임 클릭 시 재생 -->
    <main class="vid" id="main">
        <div class="reel-bg reel-bg--a" aria-hidden="true">
            <svg viewBox="0 0 100 100" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="50" cy="50" r="46"/><circle cx="50" cy="50" r="11"/>
                <circle cx="50" cy="21" r="8"/><circle cx="50" cy="79" r="8"/><circle cx="21" cy="50" r="8"/><circle cx="79" cy="50" r="8"/>
                <circle cx="30" cy="30" r="6"/><circle cx="70" cy="30" r="6"/><circle cx="30" cy="70" r="6"/><circle cx="70" cy="70" r="6"/>
            </svg>
        </div>
        <div class="reel-bg reel-bg--b" aria-hidden="true">
            <svg viewBox="0 0 100 100" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="50" cy="50" r="46"/><circle cx="50" cy="50" r="11"/>
                <circle cx="50" cy="21" r="8"/><circle cx="50" cy="79" r="8"/><circle cx="21" cy="50" r="8"/><circle cx="79" cy="50" r="8"/>

        <header class="vid-hero">
            <p class="vid-hero__eyebrow">ON FILM</p>
            <h1 class="vid-hero__title">영상</h1>

        <section class="film" aria-label="필름 스트립">
            <div class="film__perf" aria-hidden="true"></div>
            <div class="film__viewport">
                <div class="film__track" id="filmTrack"><!-- 프레임은 JS가 생성 --></div>

    <!-- @동작 영상 재생 라이트박스(프로젝터) -->

    <a class="totop" href="#main" id="totop" aria-label="맨 위로">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 15 L12 8 L19 15"></path></svg>
    </a>

    <script>
// ==========================================================================
// 영상 페이지 - 헤더/햄버거 + 필름 스트립(자동 흐름) + 프레임 클릭 재생
// ==========================================================================

// --- @동작 헤더 축소 / 햄버거 드로어 ---
const onScroll = () => document.body.classList.toggle('scrolled', window.scrollY > 40);
window.addEventListener('scroll', onScroll, { passive: true }); onScroll();
const burger = document.getElementById('navBurger');
const backdrop = document.getElementById('navBackdrop');
const toggleNav = (open) => { document.body.classList.toggle('nav--open', open); burger.setAttribute('aria-expanded', open); };
if (burger) burger.addEventListener('click', () => toggleNav(!document.body.classList.contains('nav--open')));
if (backdrop) backdrop.addEventListener('click', () => toggleNav(false));

// --- @데이터 영상 프레임 (실제 파일/설명으로 교체 가능) ---
const FRAMES = [
    { src: 'media/videos/reel1.mp4',    poster: 'media/videos/thumbs/reel1.jpg',    title: '이층버스',      place: '런던',   desc: '빨간 이층버스가 회색 거리를 가르며 지나갔다.' },
    { src: 'media/videos/reel2.mp4',    poster: 'media/videos/thumbs/reel2.jpg',    title: '5번가의 아침',  place: '뉴욕',   desc: '노란 택시들이 마천루 사이 교차로를 가득 메웠다.' },
    { src: 'media/videos/reel3.mp4',    poster: 'media/videos/thumbs/reel3.jpg',    title: '도톤보리의 밤', place: '오사카', desc: '간판 불빛이 좁은 골목을 대낮처럼 밝혔다.' },
    { src: 'media/videos/reel4.mp4',    poster: 'media/videos/thumbs/reel4.jpg',    title: '야자수 해변',   place: '브라질', desc: '에메랄드빛 바다와 야자수가 끝없이 늘어섰다.' },
    { src: 'media/videos/reel5.mp4',    poster: 'media/videos/thumbs/reel5.jpg',    title: '가로수길 카페', place: '파리',   desc: '노천 테이블마다 느긋한 오후가 흘렀다.' },
    { src: 'media/videos/reel6.mp4',    poster: 'media/videos/thumbs/reel6.jpg',    title: '바닷가 산책로', place: '제주',   desc: '바다를 옆에 두고 둘이 나란히 걸었다.' },
    { src: 'media/videos/reel7.mp4',    poster: 'media/videos/thumbs/reel7.jpg',    title: '도시의 밤',     place: '야경',   desc: '언덕 위에서 내려다본 도시가 불빛으로 흘렀다.' },
    { src: 'media/videos/reel8.mp4', poster: 'media/videos/thumbs/reel8.jpg', title: '범선의 일몰',   place: '항해',   desc: '돛이 부풀고, 수평선 너머로 해가 내려앉았다.' },
    { src: 'media/videos/reel9.mp4', poster: 'media/videos/thumbs/reel9.jpg', title: '오페라하우스',  place: '시드니', desc: '조개 지붕 너머로 하버 브리지가 나란히 섰다.' },
    { src: 'media/videos/reel10.mp4', poster: 'media/videos/thumbs/reel10.jpg', title: '에스프레소 한 잔', place: '카페', desc: '크레마가 잔을 채우던 짧고 진한 순간.' },
    { src: 'media/videos/reel11.mp4', poster: 'media/videos/thumbs/reel11.jpg', title: '펍의 저녁',     place: '런던',   desc: '버거와 맥주 한 잔으로 마무리한 하루.' },
];

// --- @동작 필름 스트립 렌더 (원활한 무한 흐름을 위해 두 벌 복제) ---
const PLAY_SVG = '<svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M8 5v14l11-7z"/></svg>';
function frameHTML(f) {
    return '<button class="frame" type="button" data-src="' + f.src + '" data-title="' + f.title + '" data-place="' + f.place + '" data-desc="' + f.desc + '">'
        + '<img src="' + f.poster + '" alt="' + f.title + '" loading="lazy">'
        + '<span class="frame__play">' + PLAY_SVG + '</span>'
        + '<span class="frame__cap"><span class="frame__title">' + f.title + '</span><span class="frame__place">' + f.place + '</span></span>'
        + '</button>';
}
const track = document.getElementById('filmTrack');
const half = FRAMES.map(frameHTML).join('');
track.innerHTML = half + half;

// --- @동작 필름 릴 자동 이동(옆으로 계속). 프레임이 두 벌이라 절반 지점에서 되돌려 매끄럽게 루프.
//     휠·드래그로 직접 넘기면 잠깐 멈췄다가 다시 자동 이동 ---
const filmVp = document.querySelector('.film__viewport');
let filmPauseUntil = 0;
['wheel', 'pointerdown', 'touchstart'].forEach((ev) => filmVp.addEventListener(ev, () => { filmPauseUntil = Date.now() + 1600; }, { passive: true }));
(function filmRoll() {
    if (Date.now() > filmPauseUntil && filmVp.scrollWidth > filmVp.clientWidth) {
        filmVp.scrollLeft += 0.6;
        const halfW = filmVp.scrollWidth / 2;
        if (filmVp.scrollLeft >= halfW) filmVp.scrollLeft -= halfW;
    }
    requestAnimationFrame(filmRoll);
})();

// --- @동작 프레임 클릭 → 라이트박스에서 재생 ---
const reelPop = document.getElementById('reelPop');
const reelVideo = document.getElementById('reelVideo');
function openReel(src, title, place, desc) {
    reelVideo.src = src;
    document.getElementById('reelTitle').textContent = title;
    document.getElementById('reelPlace').textContent = place;
    document.getElementById('reelDesc').textContent = desc || '';
    reelPop.hidden = false;
    requestAnimationFrame(() => reelPop.classList.add('is-open'));
    reelVideo.play().catch(() => {});
}
function closeReel() {
    reelPop.classList.remove('is-open');
    reelVideo.pause();
    setTimeout(() => { reelPop.hidden = true; reelVideo.removeAttribute('src'); reelVideo.load(); }, 320);
}
track.addEventListener('click', (e) => {
    const btn = e.target.closest('.frame');
    if (!btn) return;
    openReel(btn.dataset.src, btn.dataset.title, btn.dataset.place, btn.dataset.desc);
});
document.getElementById('reelClose').addEventListener('click', closeReel);
reelPop.querySelector('[data-close]').addEventListener('click', closeReel);
document.addEventListener('keydown', (e) => { if (e.key === 'Escape' && !reelPop.hidden) closeReel(); });

// ===== ATELIER 포팅킷: 커스텀 커서 + 오버레이 메뉴 + 스크롤 프로그레스 (IIFE) =====
(function () {
    'use strict';
    var reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    var finePointer  = window.matchMedia('(hover: hover) and (pointer: fine)').matches;
    function initCursor() {
        if (!finePointer || reduceMotion) return;
        var dot = document.createElement('div'), ring = document.createElement('div');
        dot.className = 'cursor-dot'; ring.className = 'cursor-ring';
        document.body.append(dot, ring);
        var mx = innerWidth / 2, my = innerHeight / 2, rx = mx, ry = my;
        document.addEventListener('mousemove', function (e) { mx = e.clientX; my = e.clientY; dot.style.transform = 'translate(' + mx + 'px,' + my + 'px)'; });
        (function l() { rx += (mx - rx) * 0.16; ry += (my - ry) * 0.16; ring.style.transform = 'translate(' + rx + 'px,' + ry + 'px)'; requestAnimationFrame(l); })();
        var hoverSel = 'a, button, select, input, textarea, label, .frame';
        document.addEventListener('mouseover', function (e) { if (e.target.closest(hoverSel)) ring.classList.add('is-hover'); });
        document.addEventListener('mouseout', function (e) { if (e.target.closest(hoverSel)) ring.classList.remove('is-hover'); });
    }
    function initOverlayMenu() {
        var menu = document.getElementById('overlayMenu'), openBtn = document.getElementById('menuBtn'), closeBtn = document.getElementById('overlayClose');
        if (!menu || !openBtn) return;
        var open = function () { menu.classList.add('is-open'); document.body.classList.add('menu-open'); openBtn.setAttribute('aria-expanded', 'true'); };
        var close = function () { menu.classList.remove('is-open'); document.body.classList.remove('menu-open'); openBtn.setAttribute('aria-expanded', 'false'); };
        openBtn.addEventListener('click', open);
        if (closeBtn) closeBtn.addEventListener('click', close);
        menu.querySelectorAll('.overlay-nav a').forEach(function (a) { a.addEventListener('click', close); });
        document.addEventListener('keydown', function (e) { if (e.key === 'Escape') close(); });
    }
    function initProgress() {
        var bar = document.querySelector('.scroll-progress');
        if (!bar) return;
        var handler = function () { var d = document.documentElement; var max = d.scrollHeight - d.clientHeight; bar.style.width = (max > 0 ? (d.scrollTop / max) * 100 : 0) + '%'; };
        document.addEventListener('scroll', handler, { passive: true }); handler();
    }
    var boot = function () { initCursor(); initOverlayMenu(); initProgress(); };
    if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', boot); else boot();
})();

// ===== 드로어 닫기(X) 버튼 =====
(function () {
    var c = document.getElementById('navDrawerClose'), b = document.getElementById('navBackdrop');
    if (c && b) c.addEventListener('click', function () { b.click(); });
})();
    </script>
    <script defer src="js/music-continue.js"></script>
