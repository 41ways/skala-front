    <main class="tg" id="main">
        <!-- @동작 배경: 버튼에 hover하면 그 카테고리 대표 이미지로 크로스페이드. 평소엔 다크 그라데이션 -->
        <!-- @확장 실제 이미지 교체: 아래 4개 파일(bg-photo/music/video/etc)만 네 사진으로 바꾸면 됨 -->
        <div class="tg__stage">
            <img class="tg__bg" data-bg="photo" src="media/album/covers/photo.jpg" alt="" aria-hidden="true">
            <img class="tg__bg" data-bg="music" src="media/album/covers/music.jpg" alt="" aria-hidden="true">
            <img class="tg__bg" data-bg="video" src="media/album/covers/video.jpg" alt="" aria-hidden="true">
            <img class="tg__bg" data-bg="etc"   src="media/album/covers/etc.jpg"   alt="" aria-hidden="true">
            <span class="tg__scrim" aria-hidden="true"></span>
        </div>

        <!-- @동작 앨범 종류 선택: 사진 / 음악 / 영상 / 기타 (누르면 넘어갈 화면은 추후 연결) -->
        <!-- @동작 텍스트 없이 사진 버튼만 가운데 정렬. hover하면 그 사진이 그대로 배경에 크로스페이드 -->
        <section class="tg-pick tg-pick--photos">
            <span class="tg-pick__album" aria-hidden="true">ALBUM</span>
            <nav class="tg-pick__grid" id="tgPick" aria-label="앨범 종류">
                <button type="button" class="tg-tile" data-cat="photo" aria-label="사진">
                    <img class="tg-tile__img" src="media/album/covers/photo.jpg" alt="사진">
                    <span class="tg-tile__cap" aria-hidden="true">PHOTO</span>
                </button>
                <button type="button" class="tg-tile" data-cat="music" aria-label="음악">
                    <img class="tg-tile__img" src="media/album/covers/music.jpg" alt="음악">
                    <span class="tg-tile__cap" aria-hidden="true">MUSIC</span>
                </button>
                <button type="button" class="tg-tile" data-cat="video" aria-label="영상">
                    <img class="tg-tile__img" src="media/album/covers/video.jpg" alt="영상">
                    <span class="tg-tile__cap" aria-hidden="true">VIDEO</span>
                </button>
                <button type="button" class="tg-tile" data-cat="etc" aria-label="기타">
                    <img class="tg-tile__img" src="media/album/covers/etc.jpg" alt="기타">
                    <span class="tg-tile__cap" aria-hidden="true">ETC.</span>
                </button>
            </nav>
        </section>

        <!-- @주의 과제 필수 요소(다음 화면에서 사용 예정): 영상 video/source · 음악 audio/source -->
        <video id="tgVideo" hidden muted playsinline preload="none" poster="media/album/sample/video1_poster.jpg">
            <source src="media/album/sample/video1.mp4" type="video/mp4">
        </video>
        <audio id="tgAudio" preload="none" hidden>
            <source src="media/album/sample/track1.mp3" type="audio/mpeg">
        </audio>
    </main>

    <!-- ATELIER 포팅킷: 풀스크린 오버레이 메뉴 (데스크톱 MENU 버튼으로 열림) -->
    <div class="overlay-menu" id="overlayMenu" role="dialog" aria-modal="true" aria-label="사이트 메뉴">
        <div class="overlay-top">
            <button class="overlay-close" id="overlayClose" type="button" aria-label="메뉴 닫기">Close <span aria-hidden="true">&#10005;</span></button>
        </div>
        <nav class="overlay-nav" aria-label="주요 메뉴">
            <ol>
                <li><a href="index.html"><span class="n">00</span> 홈 <span class="en">Hello, world!</span></a></li>
                <li><a href="myProfile.html"><span class="n">01</span> 소개 <span class="en">Profile</span></a></li>
                <li><a href="myClass.html"><span class="n">02</span> 시간표 <span class="en">Class</span></a></li>
                <li><a href="myTrip.html"><span class="n">03</span> 앨범 <span class="en">Album</span></a></li>
                <li><a href="myHoliday.html"><span class="n">04</span> 휴일계획 <span class="en">Holiday</span></a></li>
            </ol>
        </nav>
        <div class="overlay-foot">
            <span><a href="login.html">로그인</a> &middot; <a href="signUp.html">회원가입</a></span>
            <span>&copy; 2026 한결</span>
        </div>
    </div>

    <a class="totop" href="#main" id="totop" aria-label="맨 위로">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 15 L12 8 L19 15"></path></svg>
    </a>

    <script>
// ==========================================================================
// 앨범 - 헤더/햄버거 + 종류 선택(사진/영상/음악/기타)
// ==========================================================================
const onScroll = () => document.body.classList.toggle('scrolled', window.scrollY > 40);
window.addEventListener('scroll', onScroll, { passive: true }); onScroll();

const burger = document.getElementById('navBurger');
const backdrop = document.getElementById('navBackdrop');
const toggleNav = (open) => {
    document.body.classList.toggle('nav--open', open);
    burger.setAttribute('aria-expanded', open);
    const sw = window.innerWidth - document.documentElement.clientWidth;
    document.body.style.paddingRight = open ? sw + 'px' : '';
    document.body.style.overflow = open ? 'hidden' : '';
};
if (burger) burger.addEventListener('click', () => toggleNav(!document.body.classList.contains('nav--open')));
if (backdrop) backdrop.addEventListener('click', () => toggleNav(false));

// --- @동작 hover → 배경 크로스페이드 / 나가면 다크 그라데이션 ---
const bgs = {};
document.querySelectorAll('.tg__bg').forEach((el) => { bgs[el.dataset.bg] = el; });
function setBg(cat) {
    Object.entries(bgs).forEach(([k, el]) => el.classList.toggle('is-on', k === cat));
}
const grid = document.getElementById('tgPick');
document.querySelectorAll('.tg-tile').forEach((tile) => {
    const cat = tile.dataset.cat;
    tile.addEventListener('mouseenter', () => setBg(cat));
    tile.addEventListener('focus', () => setBg(cat));
    // --- @동작 클릭 → 해당 종류 화면으로 이동 (음악=myMusic.html 완성, 나머지는 추후 연결) ---
    tile.addEventListener('click', () => {
        const pages = { music: 'myMusic.html', photo: 'myPhotos.html', video: 'myVideo.html', etc: 'etc.html' };
        if (pages[cat]) { location.href = pages[cat]; return; }
        console.log('선택한 종류(준비 중):', cat);
    });
});
grid.addEventListener('mouseleave', () => setBg(null));
    
// ===== ATELIER 포팅킷: 커스텀 커서 + 오버레이 메뉴 + 스크롤 프로그레스 (IIFE, 기존 코드와 충돌 없음) =====
(function () {
    'use strict';
    var reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    var finePointer  = window.matchMedia('(hover: hover) and (pointer: fine)').matches;

    function initCursor() {
        if (!finePointer || reduceMotion) return;
        var dot = document.createElement('div'), ring = document.createElement('div');
        dot.className = 'cursor-dot'; ring.className = 'cursor-ring';
        document.body.append(dot, ring);
        var mx = innerWidth / 2, my = innerHeight / 2, rx = mx, ry = my;
        document.addEventListener('mousemove', function (e) {
            mx = e.clientX; my = e.clientY;
            dot.style.transform = 'translate(' + mx + 'px,' + my + 'px)';
        });
        (function loop() {
            rx += (mx - rx) * 0.16; ry += (my - ry) * 0.16;
            ring.style.transform = 'translate(' + rx + 'px,' + ry + 'px)';
            requestAnimationFrame(loop);
        })();
        var hoverSel = 'a, button, select, input, textarea, label, .split-panel, .tg-tile, .pass__ticket, .flip, .goal-card, .cl-nav__toggle';
        document.addEventListener('mouseover', function (e) { if (e.target.closest(hoverSel)) ring.classList.add('is-hover'); });
        document.addEventListener('mouseout', function (e) { if (e.target.closest(hoverSel)) ring.classList.remove('is-hover'); });
    }

    function initOverlayMenu() {
        var menu = document.getElementById('overlayMenu');
        var openBtn = document.getElementById('menuBtn');
        var closeBtn = document.getElementById('overlayClose');
        if (!menu || !openBtn) return;
        var open = function () { menu.classList.add('is-open'); document.body.classList.add('menu-open'); openBtn.setAttribute('aria-expanded', 'true'); };
        var close = function () { menu.classList.remove('is-open'); document.body.classList.remove('menu-open'); openBtn.setAttribute('aria-expanded', 'false'); };
        openBtn.addEventListener('click', open);
        if (closeBtn) closeBtn.addEventListener('click', close);
        menu.querySelectorAll('.overlay-nav a').forEach(function (a) { a.addEventListener('click', close); });
        document.addEventListener('keydown', function (e) { if (e.key === 'Escape') close(); });
    }

    function initProgress() {
        var bar = document.querySelector('.scroll-progress');
        if (!bar) return;
        var onScroll = function () {
            var h = document.documentElement;
            var max = h.scrollHeight - h.clientHeight;
            bar.style.width = (max > 0 ? (h.scrollTop / max) * 100 : 0) + '%';
        };
        document.addEventListener('scroll', onScroll, { passive: true });
        onScroll();
    }

    var boot = function () { initCursor(); initOverlayMenu(); initProgress(); };
    if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', boot); else boot();
})();

    
// ===== 드로어 닫기(X) 버튼 → 배경 클릭과 동일하게 닫힘 =====
(function () {
    var c = document.getElementById('navDrawerClose'), b = document.getElementById('navBackdrop');
    if (c && b) c.addEventListener('click', function () { b.click(); });
})();

    </script>
    <script defer src="js/albums-data.js"></script>
    <script defer src="js/music-continue.js"></script>
</body>
